name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      # .fvmrc = source de vérité de la version Flutter (fvm en local).
      - name: Lire la version Flutter depuis .fvmrc
        id: fvm
        working-directory: .
        run: echo "version=$(jq -r .flutter .fvmrc)" >> "$GITHUB_OUTPUT"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.fvm.outputs.version }}
          channel: stable
          cache: true

      - run: flutter pub get

      - run: flutter analyze --fatal-infos

      - run: flutter test
